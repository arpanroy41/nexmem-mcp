services:

  # ── Database backends (use profiles to start only what you need) ──────

  mongodb:
    image: mongo:7
    profiles: ["mongodb"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16
    profiles: ["postgres"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: hivemind
      POSTGRES_PASSWORD: hivemind
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    profiles: ["redis"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  pg_data:
  redis_data:
